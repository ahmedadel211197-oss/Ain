<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | عين الحدث</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --N:#1a3a6b; --ND:#0e2347; --NL:#eef1f8;
  --G:#c9a84c; --GD:#a8882e;
  --W:#fff; --BG:#f0f3f8; --T:#111827; --M:#6b7280; --B:#e2e6ef;
  --ERR:#dc2626; --OK:#16a34a;
}
body{font-family:'Cairo',sans-serif;background:var(--BG);color:var(--T);min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}

/* ── PAGE ── */
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}

/* background pattern */
.page::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--ND) 0%,var(--N) 60%,#2d5a9e 100%);
  z-index:0;
}
.page::after{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(circle at 20% 50%, rgba(201,168,76,.12) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(255,255,255,.05) 0%, transparent 40%);
  z-index:0;
}

/* watermark */
.wm{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-family:'Tajawal',sans-serif;font-size:28vw;font-weight:900;
  color:rgba(255,255,255,.03);white-space:nowrap;pointer-events:none;
  z-index:0;user-select:none;
}

/* ── CARD ── */
.card{
  background:var(--W);border-radius:16px;
  box-shadow:0 24px 60px rgba(14,35,71,.35);
  width:100%;max-width:420px;
  position:relative;z-index:1;overflow:hidden;
}

.card-top{
  background:var(--N);padding:32px 32px 28px;
  text-align:center;border-bottom:3px solid var(--G);
  position:relative;overflow:hidden;
}
.card-top::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:3px;
  background:linear-gradient(to left,var(--G),var(--GD),var(--G));
}

.card-logo{height:70px;width:auto;object-fit:contain;margin:0 auto 14px;display:block}
.card-logo-fallback{
  font-family:'Tajawal',sans-serif;font-size:28px;font-weight:900;
  color:#fff;margin-bottom:8px;
}
.card-logo-fallback b{color:var(--G)}
.card-sub{font-size:12px;color:rgba(255,255,255,.55);letter-spacing:.5px}

.card-body{padding:32px}

/* ── FORM ── */
.form-group{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:700;color:var(--T);margin-bottom:7px}

.input-wrap{position:relative}
.input-wrap svg{position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.4}
.input-wrap input{
  width:100%;padding:11px 40px 11px 14px;
  border:1.5px solid var(--B);border-radius:8px;
  font-family:'Cairo',sans-serif;font-size:14px;color:var(--T);
  background:var(--BG);outline:none;transition:border-color .2s,background .2s;
  direction:rtl;
}
.input-wrap input:focus{border-color:var(--N);background:var(--W)}
.input-wrap input.err{border-color:var(--ERR)}

.toggle-pw{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:2px;
  color:var(--M);display:flex;align-items:center;
}
.toggle-pw:hover{color:var(--N)}

/* ── SUBMIT ── */
.submit-btn{
  width:100%;padding:13px;background:var(--N);color:#fff;border:none;
  border-radius:8px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:background .2s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px;
}
.submit-btn:hover{background:var(--ND);transform:translateY(-1px)}
.submit-btn:disabled{background:var(--M);cursor:default;transform:none}

/* ── ALERT ── */
.alert{
  padding:11px 14px;border-radius:8px;font-size:13px;font-weight:600;
  margin-bottom:18px;display:none;align-items:center;gap:8px;
}
.alert.err{background:#fef2f2;color:var(--ERR);border:1px solid #fecaca}
.alert.ok{background:#f0fdf4;color:var(--OK);border:1px solid #bbf7d0}

/* ── SPINNER ── */
.spin{
  width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
.card-footer{
  padding:14px 32px;background:var(--NL);
  border-top:1px solid var(--B);text-align:center;
  font-size:12px;color:var(--M);
}
.card-footer a{color:var(--N);font-weight:700}
.card-footer a:hover{color:var(--G)}

footer{background:var(--ND);color:rgba(255,255,255,.3);text-align:center;padding:12px;font-size:11px;border-top:2px solid var(--G)}
footer b{color:var(--G)}
</style>
</head>
<body>

<div class="page">
  <div class="wm">عين</div>

  <div class="card">
    <div class="card-top">
      <img class="card-logo" src="../img/logo.png" alt="عين الحدث" onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block'">
      <div class="card-logo-fallback" id="logoFallback" style="display:none">عين <b>الحدث</b></div>
      <div class="card-sub">لوحة تحكم الفريق التحريري</div>
    </div>

    <div class="card-body">

      <div class="alert err" id="errAlert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span id="errMsg"></span>
      </div>

      <div class="alert ok" id="okAlert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        جاري تحويلك للوحة التحكم...
      </div>

      <form id="loginForm" onsubmit="doLogin(event)">

        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="email" placeholder="example@email.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-pw" onclick="togglePw()" id="toggleBtn" title="إظهار/إخفاء">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          تسجيل الدخول
        </button>

      </form>
    </div>

    <div class="card-footer">
      <a href="/">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        العودة للموقع
      </a>
      <span style="margin:0 10px;color:var(--B)">|</span>
      <a href="./register.html">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        إنشاء حساب جديد
      </a>
    </div>
  </div>
</div>

<footer>جميع الحقوق محفوظة &copy; <b>عين الحدث</b></footer>

<script>
const SUPABASE_URL = 'https://eejzgklrfabvvuyksjbj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlanpna2xyZmFidnZ1eWtzamJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjkwMTcsImV4cCI6MjA4OTEwNTAxN30.gbhB_W7X3xlKkk7DjnTEhMhHqj8_O61HhaiNFq8YigI';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// الأدوار المسموح لها بدخول الداشبورد
const ALLOWED_ROLES = ['admin', 'editor', 'writer'];

// redirect if already logged in AND has permission
sb.auth.getSession().then(async ({data:{session}})=>{
  if(!session) return;
  const allowed = await checkRole(session.user.id);
  if(allowed) window.location.href='./dashboard.html';
});

async function checkRole(userId){
  const {data} = await sb.from('users')
    .select('roles(name)')
    .eq('id', userId)
    .single();
  const role = data?.roles?.name || 'user';
  return ALLOWED_ROLES.includes(role);
}

async function doLogin(e){
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('submitBtn');
  const errAlert = document.getElementById('errAlert');
  const okAlert  = document.getElementById('okAlert');

  errAlert.style.display='none';
  okAlert.style.display='none';
  document.getElementById('email').classList.remove('err');
  document.getElementById('password').classList.remove('err');

  btn.disabled=true;
  btn.innerHTML=`<div class="spin"></div> جاري التحقق...`;

  // 1. تسجيل الدخول
  const {data, error} = await sb.auth.signInWithPassword({email, password});

  if(error){
    btn.disabled=false;
    btn.innerHTML=`
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      تسجيل الدخول`;
    let msg = 'حدث خطأ، حاول مرة أخرى';
    if(error.message.includes('Invalid login')) msg = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
    if(error.message.includes('Email not confirmed')) msg = 'البريد الإلكتروني لم يتم تأكيده بعد';
    if(error.message.includes('Too many requests')) msg = 'محاولات كثيرة، انتظر قليلاً';
    document.getElementById('errMsg').textContent = msg;
    errAlert.style.display='flex';
    document.getElementById('email').classList.add('err');
    document.getElementById('password').classList.add('err');
    return;
  }

  // 2. التحقق من الرول
  const allowed = await checkRole(data.user.id);
  if(!allowed){
    await sb.auth.signOut();
    btn.disabled=false;
    btn.innerHTML=`
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      تسجيل الدخول`;
    document.getElementById('errMsg').textContent = 'ليس لديك صلاحية للوصول إلى لوحة التحكم';
    errAlert.style.display='flex';
    return;
  }

  // 3. دخول ناجح
  okAlert.style.display='flex';
  btn.innerHTML=`
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    تم الدخول بنجاح!`;
  setTimeout(()=>{ window.location.href='./dashboard.html'; }, 900);
}

function togglePw(){
  const inp = document.getElementById('password');
  const ico = document.getElementById('eyeIcon');
  if(inp.type==='password'){
    inp.type='text';
    ico.innerHTML=`<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
  } else {
    inp.type='password';
    ico.innerHTML=`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }
}

document.getElementById('email').addEventListener('input',()=>{
  document.getElementById('email').classList.remove('err');
  document.getElementById('errAlert').style.display='none';
});
document.getElementById('password').addEventListener('input',()=>{
  document.getElementById('password').classList.remove('err');
  document.getElementById('errAlert').style.display='none';
});
</script>
</body>
</html>
